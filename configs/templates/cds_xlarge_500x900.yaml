  use_shape_constraints: true
  fallback_to_fiducials: true
colour_hints:
  outer_border_hex_candidates: ["#C2185B", "#007C91", "#D35400", "#2E7D32"]
  fiducial_hex_candidates: ["#FF0000"]
outputs:
  write_rectified: true
  write_scaled: true
  write_cropped: true
  write_debug: true
