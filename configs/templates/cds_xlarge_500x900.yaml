template_id: cds_xlarge_500x900
display_name: cds_xlarge_500x900
design_area_mm:
  width: 900
  height: 500
crop_rule: inside_most_edge_of_thick_outer_border
preferred_output_dpi: 400
primary_geometry_truth: outer_border
fiducials_enabled: true
grid:
  minor_spacing_mm: 10
  major_spacing_mm: 50
